<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Route Optimization System — Interactive graph-based route planning with Bellman-Ford and Floyd-Warshall algorithms. Find shortest paths, simulate traffic, and analyze network metrics.">
  <title>Route Optimization System — Shortest Path Finder</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <!-- App CSS -->
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>

  <div class="app-layout" id="app">
    <!-- Sidebar injected by JS -->

    <div class="main-wrapper" id="main-wrapper">
      <!-- Header -->
      <header class="header" id="app-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="btn btn-icon btn-secondary mobile-toggle" id="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
          <h1 id="page-heading">🚀 Route Optimization System</h1>
        </div>
        <div class="header-actions">
          <button class="btn btn-sm btn-secondary" id="theme-toggle" onclick="toggleDarkMode()">🌙 Dark</button>
        </div>
      </header>

      <!-- Main content area -->
      <main class="main-content" id="main-content">
        <!-- Pages rendered here dynamically -->
      </main>

      <!-- Footer -->
      <footer class="footer">
        Route Optimization System v1.0 — Built with Flask, D3.js &amp; ❤️ &nbsp;|&nbsp; Bellman-Ford &amp; Floyd-Warshall Algorithms
      </footer>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- JS Modules -->
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="src/services/api.js"></script>
  <script src="src/components/toast.js"></script>
  <script src="src/components/sidebar.js"></script>
  <script src="src/components/graph.js"></script>
  <script src="src/pages/home.js"></script>
  <script src="src/pages/route-finder.js"></script>
  <script src="src/pages/graph-view.js"></script>
  <script src="src/pages/map-view.js"></script>
  <script src="src/pages/algorithm-comparison.js"></script>
  <script src="src/pages/traffic-simulation.js"></script>
  <script src="src/pages/manage-cities.js"></script>
  <script src="src/pages/analytics.js"></script>

  <script>
    /**
     * App Bootstrap — SPA router, sidebar init, dark mode.
     */

    // Page titles for the header
    const pageTitles = {
      home: '🚀 Route Optimization System',
      route: '🧭 Route Finder',
      graph: '🔗 Graph Visualization',
      map: '🗺️ Live Map',
      compare: '⚡ Algorithm Comparison',
      traffic: '🚦 Traffic Simulation',
      manage: '🏙️ Manage Cities & Roads',
      analytics: '📊 Analytics Dashboard',
    };

    // Page renderers
    const pageRenderers = {
      home: renderHomePage,
      route: renderRoutePage,
      graph: renderGraphPage,
      map: renderMapPage,
      compare: renderComparePage,
      traffic: renderTrafficPage,
      manage: renderManagePage,
      analytics: renderAnalyticsPage,
    };

    let currentPage = 'home';

    // Navigation function
    function navigateTo(page) {
      currentPage = page;
      const content = document.getElementById('main-content');
      const heading = document.getElementById('page-heading');

      // Update heading
      heading.textContent = pageTitles[page] || page;

      // Render page
      content.innerHTML = '<div style="padding:40px;text-align:center;"><div class="skeleton" style="height:200px;max-width:600px;margin:0 auto;"></div></div>';

      if (pageRenderers[page]) {
        pageRenderers[page](content);
      }

      // Close mobile sidebar
      document.getElementById('sidebar').classList.remove('open');

      // Scroll to top
      content.scrollTo(0, 0);
    }

    window.navigateTo = navigateTo;

    // Dark mode
    function toggleDarkMode() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-toggle').textContent = isDark ? '🌙 Dark' : '☀️ Light';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    window.toggleDarkMode = toggleDarkMode;

    // Mobile sidebar
    function toggleMobileSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    window.toggleMobileSidebar = toggleMobileSidebar;

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      // Restore theme
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '☀️ Light';
      }

      // Create sidebar
      const app = document.getElementById('app');
      const sidebar = createSidebar(navigateTo);
      app.insertBefore(sidebar, app.firstChild);

      // Render home page
      navigateTo('home');
    });
  </script>

</body>
</html>
